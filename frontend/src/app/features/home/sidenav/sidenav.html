<div class="flex items-center justify-center mb-6 gap-4">
    <button class="p-2 rounded-md hover:bg-gray-100 cursor-pointer focus-visible:bg-gray-100 focus-visible:ring-2 focus:outline-none" (click)="toggle()" aria-label="Toggle navigation">
        <svg width="25px" height="25px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 18L20 18" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 12L20 12" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 6L20 6" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>
    @if(!isCollapsed()) {
        <h1 class="text-2xl font-semi-bold text-[var(color-font-primary)] text-wrap transition-opacity" animate.enter="enter-animation" >Your Expenses</h1>
    }
</div>
@if(!isCollapsed()) {
    <div class="mt-auto" animate.enter="enter-animation">
        <p class="mb-3 text-sm text-gray-600">{{authService.user().fullName}}</p>
        <button
                type="button"
                class="btn-secondary"
                (click)="authService.logout()"
        >
            Logout
        </button>
    </div>
}
