<div class="flex h-full flex-col gap-6">
    <!-- Page header -->
    <header class="flex items-center justify-between">
        <h1 class="text-2xl font-semibold text-[var(--color-font-primary)]">
            Create a new expense
        </h1>
    </header>

    <!-- Form -->
    <form class="flex flex-1 flex-col justify-between gap-8">
        <!-- Fields -->
        <div class="grid max-w-2xl grid-cols-1 gap-6">
            <!-- Amount -->
            <div class="flex flex-col gap-1">
                <label for="amount" class="text-sm font-medium text-gray-700">
                    Amount
                </label>
                <input
                        id="amount"
                        type="number"
                        step="0.01"
                        class="form-control"
                        placeholder="0.00"
                />
            </div>

            <div class="flex flex-col gap-1">
                <label for="category" class="text-sm font-medium text-gray-700">
                    Category
                </label>
                <select id="category" class="form-control">
                    <option value="">Select a category</option>
                    @for (category of categories$ | async; track category.id) {
                        <option [value]="category.id">
                            {{ category.name }}
                        </option>
                    }
                </select>
            </div>

            <div class="flex flex-col gap-1">
                <label for="date" class="text-sm font-medium text-gray-700">
                    Date
                </label>
                <input
                        id="date"
                        type="date"
                        class="form-control"
                />
            </div>

            <div class="flex flex-col gap-1">
                <label for="currency" class="text-sm font-medium text-gray-700">
                    Currency
                </label>
                <select id="currency" class="form-control">
                    <option value="EUR">EUR</option>
                    <option value="USD">USD</option>
                </select>
            </div>
        </div>

        <footer class="flex justify-end gap-3 border-t pt-6">
            <a
                    routerLink="../expense-list"
                    class="btn-secondary"
            >
                Cancel
            </a>

            <button
                    type="submit"
                    class="btn-primary"
            >
                Create expense
            </button>
        </footer>
    </form>
</div>
