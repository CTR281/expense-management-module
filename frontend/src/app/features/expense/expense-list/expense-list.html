<div class="flex justify-between gap-4 flex-1">
    <app-expense-filters></app-expense-filters>
    <a
            routerLink="/expenses/new"
            class="btn-primary w-fit h-fit text-center"
    >
        New Expense
    </a>
</div>

<div class="flex-18 mt-6">
    @if(expensesState.loading()) {
        <p>Loading expenses...</p>
    } @else {
        <div class="flex flex-col gap-2">
            @for (expense of expensesState.data().data; track expense.id) {
                <app-expense-card [expense]="expense" (click)="navigateToDetails(expense.id)"></app-expense-card>
            }
        </div>
    }
</div>

@if(expensesState.data().data?.length | not : 0) {
    <app-expense-pagination class="flex-1 mt-6"></app-expense-pagination>
}
