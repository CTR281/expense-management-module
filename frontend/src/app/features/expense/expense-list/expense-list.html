<!-- FILTER COMPONENT -->
<div class="flex items-end justify-between gap-4">
    <div class="flex flex-wrap items-end gap-4">
        <div class="flex flex-col gap-1">
            <label for="category" class="text-sm font-medium text-gray-700">
                Category
            </label>
            <select id="category" class="form-control">
                <option value="">Category</option>
                @for(category of categories$ | async; track category.id) {
                    <option [value]="category.id">{{ category.name }}</option>
                }
            </select>
        </div>
        <div class="flex flex-col gap-1">
            <label for="from" class="text-sm font-medium text-gray-700">
                From
            </label>
            <input id="from" type="date" class="form-control" />
        </div>
        <div class="flex flex-col gap-1">
            <label for="to" class="text-sm font-medium text-gray-700">
                To
            </label>
            <input id="to" type="date" class="form-control" />
        </div>
    </div>
    <a
            routerLink="/expenses/new"
            class="btn-primary w-fit self-end"
    >
        New expense
    </a>
</div>

@for (expense of expenses$ | async; track expense.id) {
    <p>{{ expense.date}}</p>
}
